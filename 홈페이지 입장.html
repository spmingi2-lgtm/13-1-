<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입장 확인</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #f5f6f7, #dfe9f3);
      margin: 0;
      padding: 0;
    }
    .box {
      width: 380px;
      margin: 100px auto;
      padding: 30px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
      text-align: center;
    }
    .captcha-area {
      margin: 20px 0;
      padding: 16px;
      background: #f7f7f7;
      border-radius: 12px;
    }
    input {
      width: 100%;
      height: 42px;
      box-sizing: border-box;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      width: 100%;
      height: 45px;
      margin-top: 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    .success { background: #e7f9ed; color: #1b7f3b; }
    .error { background: #fff0f0; color: #d93025; }
  </style>
</head>
<body>
  <div class="box">
    <h1>전봇대 안내 입장</h1>
    <p>캡챠를 통과하면 안내 페이지로 이동합니다.</p>

    <div class="captcha-area">
      <div id="q">질문 로딩 중...</div>
      <input type="text" id="a" placeholder="정답 입력">
    </div>

    <button onclick="checkCaptcha()">입장하기</button>
    <div id="msg" class="message"></div>
  </div>

  <script>
    const q = document.getElementById("q");
    const a = document.getElementById("a");
    const msg = document.getElementById("msg");
    let answer = "";

    function makeCaptcha() {
      const x = Math.floor(Math.random() * 10) + 1;
      const y = Math.floor(Math.random() * 10) + 1;
      answer = String(x + y);
      q.textContent = `질문: ${x} + ${y} = ?`;
    }

    function show(text, type) {
      msg.style.display = "block";
      msg.className = "message " + type;
      msg.textContent = text;
    }

    function checkCaptcha() {
      if (a.value.trim() === answer) {
        show("확인되었습니다. 이동합니다.", "success");
        setTimeout(() => {
          window.location.replace("main.html");
        }, 800);
      } else {
        show("틀렸습니다. 다시 시도하세요.", "error");
        a.value = "";
        makeCaptcha();
      }
    }

    a.addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkCaptcha();
    });

    makeCaptcha();
  </script>
</body>
</html>
